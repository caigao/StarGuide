version: '3.8'

services:
  backend:
    build: ./backend
    container_name: starguide-backend
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=production
    env_file:
      - .env
    volumes:
      - ./backend/starguide.db:/app/starguide.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: starguide-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
